<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galactic Command v1.1</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        :root { --bg-dark: #05070a; --panel-bg: rgba(10, 20, 30, 0.95); --border-glow: #00d2ff; }
        body { margin: 0; background: var(--bg-dark); color: #e0e0e0; font-family: sans-serif; overflow: hidden; }
        #map-container { width: 100vw; height: 100vh; display: block; background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0); background-size: 40px 40px; }
        .planet-node { cursor: pointer; transition: 0.3s; }
        .planet-node:hover .planet-circle { r: 14; filter: brightness(1.5); }
        .planet-label { pointer-events: none; font-size: 11px; font-weight: bold; letter-spacing: 1px; }
        .contested { animation: pulse-warp 2s infinite ease-in-out; }
        @keyframes pulse-warp {
            0% { filter: drop-shadow(0 0 2px #ff0000); stroke: rgba(255,0,0,0.5); stroke-width: 2px; }
            50% { filter: drop-shadow(0 0 12px #ff0000); stroke: rgba(255,0,0,1); stroke-width: 5px; }
            100% { filter: drop-shadow(0 0 2px #ff0000); stroke: rgba(255,0,0,0.5); stroke-width: 2px; }
        }
        #info-panel { position: absolute; pointer-events: none; background: var(--panel-bg); border: 1px solid var(--border-glow); padding: 15px; border-radius: 4px; display: none; min-width: 220px; box-shadow: 0 0 20px rgba(0, 210, 255, 0.3); backdrop-filter: blur(8px); z-index: 999; }
        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-dark); display: flex; align-items: center; justify-content: center; z-index: 1000; font-weight: bold; }
    </style>
</head>
<body>

<div id="loading-overlay">SYNCHRONIZING WITH SATELLITE...</div>
<div id="info-panel"></div>
<svg id="map-container" viewBox="0 0 1000 1000"></svg>

<script>
    const PLANETS_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTtmIX95darstHqTgJ00Rp7LQhFNvJ0P-qVZ-ptGiKo3ZyYhHkw2ucJFvRDS8cpb9E0gH4m3-8CNCp9/pub?gid=0&single=true&output=csv';
    const UNITS_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTtmIX95darstHqTgJ00Rp7LQhFNvJ0P-qVZ-ptGiKo3ZyYhHkw2ucJFvRDS8cpb9E0gH4m3-8CNCp9/pub?gid=2047054726&single=true&output=csv';

    let planetsData = [];
    let unitsData = [];

    // Helper: Gets a value from an object regardless of key capitalization
    const getVal = (obj, key) => {
        const foundKey = Object.keys(obj).find(k => k.toLowerCase().trim() === key.toLowerCase());
        return foundKey ? obj[foundKey] : null;
    };

    async function fetchCSV(url) {
        const response = await fetch(url);
        if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
        const csvText = await response.text();
        return new Promise((resolve) => {
            Papa.parse(csvText, { header: true, skipEmptyLines: true, complete: (res) => resolve(res.data) });
        });
    }

    async function loadAllData() {
        try {
            console.log("Fetching data...");
            [planetsData, unitsData] = await Promise.all([fetchCSV(PLANETS_CSV_URL), fetchCSV(UNITS_CSV_URL)]);
            console.log("Planets Loaded:", planetsData.length);
            console.log("Units Loaded:", unitsData.length);
            
            document.getElementById('loading-overlay').style.display = 'none';
            renderMap();
        } catch (error) {
            console.error("Critical Error:", error);
            document.getElementById('loading-overlay').innerHTML = `CONNECTION FAILED<br><small style="font-weight:normal; color:red; margin-top:10px;">${error.message}</small>`;
        }
    }

    function renderMap() {
        const svg = document.getElementById('map-container');
        svg.innerHTML = ''; 

        planetsData.forEach((p, index) => {
            // Mapping values with tolerance for different header names
            const id = getVal(p, 'id');
            const name = getVal(p, 'name') || `Planet ${index}`;
            const x = parseFloat(getVal(p, 'x'));
            const y = parseFloat(getVal(p, 'y'));
            const color = getVal(p, 'hexcolor') || '#ffffff';
            const status = getVal(p, 'status');

            // Skip if coordinates are missing
            if (isNaN(x) || isNaN(y)) return;

            const localUnits = unitsData.filter(u => getVal(u, 'planetid') === id);
            const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
            g.setAttribute("class", "planet-node");

            const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            circle.setAttribute("cx", x); circle.setAttribute("cy", y); circle.setAttribute("r", 10);
            circle.setAttribute("fill", color);
            circle.setAttribute("class", `planet-circle ${status === 'Contested' ? 'contested' : ''}`);
            
            const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
            text.setAttribute("x", x); text.setAttribute("y", y + 28);
            text.setAttribute("text-anchor", "middle"); text.setAttribute("fill", color);
            text.setAttribute("class", "planet-label");
            text.textContent = `${name.toUpperCase()} [${localUnits.length}]`;

            g.addEventListener('mouseenter', (e) => showPanel(e, p, localUnits));
            g.addEventListener('mousemove', movePanel);
            g.addEventListener('mouseleave', hidePanel);

            g.appendChild(circle); g.appendChild(text); svg.appendChild(g);
        });
    }

    const panel = document.getElementById('info-panel');

    function showPanel(e, p, units) {
        const name = getVal(p, 'name');
        const color = getVal(p, 'hexcolor') || '#fff';
        
        let unitListHtml = units.map(u => `
            <div style="padding:4px; background:rgba(255,255,255,0.05); margin-bottom:2px; border-left:2px solid ${getVal(u, 'hexcolor') || '#999'}; font-size:0.8em;">
                <strong>${getVal(u, 'name')}</strong><br/>${getVal(u, 'type')} • STR: ${getVal(u, 'strength')}
            </div>
        `).join('');

        panel.innerHTML = `
            <div style="border-bottom:1px solid #333; margin-bottom:10px; padding-bottom:5px;">
                <div style="font-size:1.2em; font-weight:bold; color:${color}">${name.toUpperCase()}</div>
                <div style="font-size:0.7em; opacity:0.7;">${getVal(p, 'type') || 'UNKNOWN'} SECTOR</div>
            </div>
            <div style="display:flex; justify-content:space-between; font-size:0.85em; margin:3px 0;"><span>Owner:</span><strong>${getVal(p, 'owner')}</strong></div>
            <div style="display:flex; justify-content:space-between; font-size:0.85em; margin:3px 0;"><span>Status:</span><span>${getVal(p, 'status')}</span></div>
            <div style="margin-top:12px; font-size:0.8em; border-top:1px solid #444; padding-top:5px;">
                ORBITAL PRESENCE (${units.length})<br/>${unitListHtml || 'No units detected.'}
            </div>
        `;
        panel.style.display = 'block';
    }

    function movePanel(e) { panel.style.left = (e.pageX + 20) + 'px'; panel.style.top = (e.pageY + 20) + 'px'; }
    function hidePanel() { panel.style.display = 'none'; }

    loadAllData();
</script>
</body>
</html>

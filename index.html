<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tactical Command Console v2.5</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        :root {
            --bg-dark: #020406;
            --panel-bg: rgba(5, 12, 18, 0.95);
            --tactical-blue: #00d2ff;
            --warhammer-red: #ff1100;
            --resource-gold: #f1c40f;
            --manpower-green: #2ecc71;
            --border-style: 1px solid rgba(0, 210, 255, 0.3);
        }

        body { 
            margin: 0; background: var(--bg-dark); color: #e0e0e0; 
            font-family: 'Courier New', Courier, monospace; 
            display: flex; height: 100vh; overflow: hidden; 
        }

        /* --- LAYOUT --- */
        #map-container { 
            flex-grow: 1; height: 100vh; position: relative; cursor: crosshair;
            background-image: 
                linear-gradient(rgba(0, 210, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 210, 255, 0.05) 1px, transparent 1px);
            background-size: 100px 100px;
        }

        #sidebar {
            width: 380px; height: 100vh; background: var(--panel-bg);
            border-left: 2px solid var(--tactical-blue); padding: 20px;
            box-sizing: border-box; overflow-y: auto; z-index: 100;
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
        }

        /* --- PLANETS --- */
        .planet-node { cursor: pointer; }
        .planet-circle { transition: 0.4s; stroke: rgba(255,255,255,0.2); }
        .planet-node:hover .planet-circle { r: 15; filter: drop-shadow(0 0 10px var(--tactical-blue)); }
        
        /* AGGRESSIVE CONTESTED PULSE */
        .contested-pulse { animation: alert-red 1.2s infinite; stroke-width: 4px !important; }
        @keyframes alert-red {
            0% { filter: drop-shadow(0 0 2px var(--warhammer-red)); r: 10; opacity: 1; }
            50% { filter: drop-shadow(0 0 25px var(--warhammer-red)); r: 14; opacity: 0.8; stroke: var(--warhammer-red); }
            100% { filter: drop-shadow(0 0 2px var(--warhammer-red)); r: 10; opacity: 1; }
        }

        /* --- TOOLTIP (Quick Look) --- */
        #quick-look {
            position: absolute; pointer-events: none; display: none;
            background: rgba(0,0,0,0.8); border: 1px solid var(--tactical-blue);
            padding: 5px 10px; font-size: 12px; color: var(--tactical-blue);
            white-space: nowrap; z-index: 1000; text-transform: uppercase;
        }

        /* --- SIDEBAR COMPONENTS --- */
        .sidebar-header { border-bottom: 3px double var(--tactical-blue); margin-bottom: 20px; padding-bottom: 10px; }
        .sidebar-header h2 { margin: 0; letter-spacing: 2px; }
        
        .contested-banner {
            background: var(--warhammer-red); color: white; text-align: center;
            font-weight: bold; padding: 5px; margin: 10px 0; font-size: 0.8em;
            animation: blink 0.8s infinite alternate;
        }
        @keyframes blink { from { opacity: 0.4; } to { opacity: 1; } }

        .unit-card { 
            background: rgba(0, 210, 255, 0.05); border: var(--border-style);
            margin-bottom: 15px; padding: 12px; border-left: 5px solid var(--tactical-blue);
        }
        .comp-row { display: flex; justify-content: space-between; font-size: 0.8em; color: #aaa; margin-top: 3px; }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            #sidebar { width: 100%; height: 40vh; border-left: none; border-top: 2px solid var(--tactical-blue); }
            #map-container { height: 60vh; }
        }

        #loading { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 9999; }
    </style>
</head>
<body>

<div id="loading">SCANNING SECTOR...</div>

<div id="map-container">
    <div id="quick-look"></div>
    <svg id="svg-map" viewBox="0 0 1000 1000" style="width:100%; height:100%"></svg>
</div>

<aside id="sidebar">
    <div id="sidebar-content">
        <div class="sidebar-header">
            <h3 style="opacity: 0.5;">NO PLANET SELECTED</h3>
            <p>Select a planetary node for tactical readout.</p>
        </div>
    </div>
</aside>

<script>
    const PLANETS_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTtmIX95darstHqTgJ00Rp7LQhFNvJ0P-qVZ-ptGiKo3ZyYhHkw2ucJFvRDS8cpb9E0gH4m3-8CNCp9/pub?gid=0&single=true&output=csv';
    const UNITS_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTtmIX95darstHqTgJ00Rp7LQhFNvJ0P-qVZ-ptGiKo3ZyYhHkw2ucJFvRDS8cpb9E0gH4m3-8CNCp9/pub?gid=2047054726&single=true&output=csv';
    const FLEET_ICON_URL = 'https://raw.githubusercontent.com/Nerdzul/MapTest/refs/heads/main/fleet_Icon_-svg.svg';

    let planetsData = [], unitsData = [];
    const getVal = (obj, key) => {
        const found = Object.keys(obj).find(k => k.toLowerCase().trim() === key.toLowerCase());
        return found ? obj[found] : null;
    };

    async function init() {
        const [p, u] = await Promise.all([
            fetch(PLANETS_CSV_URL).then(r => r.text()),
            fetch(UNITS_CSV_URL).then(r => r.text())
        ]);
        planetsData = Papa.parse(p, {header:true}).data;
        unitsData = Papa.parse(u, {header:true}).data;
        document.getElementById('loading').style.display = 'none';
        renderMap();
    }

    function renderMap() {
        const svg = document.getElementById('svg-map');
        planetsData.forEach(p => {
            const id = getVal(p, 'id'), x = parseFloat(getVal(p, 'x')), y = parseFloat(getVal(p, 'y'));
            if (isNaN(x) || isNaN(y)) return;

            const units = unitsData.filter(u => getVal(u, 'planetid') === id);
            const status = (getVal(p, 'status') || "").toLowerCase();
            const color = getVal(p, 'hexcolor') || "#fff";

            const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
            g.setAttribute("class", "planet-node");

            // Planet Circle
            const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            c.setAttribute("cx", x); c.setAttribute("cy", y); c.setAttribute("r", 10);
            c.setAttribute("fill", color);
            c.setAttribute("class", `planet-circle ${status === 'contested' ? 'contested-pulse' : ''}`);
            
            // Unit Counter (Keep it on map)
            if (units.length > 0) {
                const bG = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                bG.setAttribute("cx", x + 18); bG.setAttribute("cy", y - 10); bG.setAttribute("r", 8);
                bG.setAttribute("fill", "rgba(0,0,0,0.8)"); bG.setAttribute("stroke", "#00d2ff");
                g.appendChild(bG);
                const bT = document.createElementNS("http://www.w3.org/2000/svg", "text");
                bT.setAttribute("x", x + 18); bT.setAttribute("y", y - 7);
                bT.setAttribute("text-anchor", "middle"); bT.setAttribute("fill", "#fff");
                bT.style.fontSize = "9px"; bT.textContent = units.length;
                g.appendChild(bT);
            }

            // Fleet Icon
            if (units.some(u => (getVal(u, 'type')||"").toLowerCase().includes('fleet'))) {
                const img = document.createElementNS("http://www.w3.org/2000/svg", "image");
                img.setAttributeNS('http://www.w3.org/1999/xlink', 'href', FLEET_ICON_URL);
                img.setAttribute("x", x - 32); img.setAttribute("y", y - 18);
                img.setAttribute("height", "20"); img.setAttribute("width", "20");
                g.appendChild(img);
            }

            const label = document.createElementNS("http://www.w3.org/2000/svg", "text");
            label.setAttribute("x", x); label.setAttribute("y", y + 30);
            label.setAttribute("text-anchor", "middle"); label.setAttribute("fill", color);
            label.style.fontSize = "10px"; label.style.fontWeight = "bold";
            label.textContent = getVal(p, 'name').toUpperCase();

            g.addEventListener('mouseenter', (e) => showQuickLook(e, p));
            g.addEventListener('mousemove', moveQuickLook);
            g.addEventListener('mouseleave', hideQuickLook);
            g.addEventListener('click', () => updateSidebar(p, units));

            g.appendChild(c); g.appendChild(label); svg.appendChild(g);
        });
    }

    const ql = document.getElementById('quick-look');
    function showQuickLook(e, p) {
        ql.innerHTML = `${getVal(p, 'name')} (${getVal(p, 'owner')})`;
        ql.style.display = 'block';
    }
    function moveQuickLook(e) { ql.style.left = (e.pageX + 10) + 'px'; ql.style.top = (e.pageY + 10) + 'px'; }
    function hideQuickLook() { ql.style.display = 'none'; }

    function updateSidebar(p, units) {
        const color = getVal(p, 'hexcolor') || '#fff';
        const isContested = (getVal(p, 'status') || "").toLowerCase() === 'contested';
        
        let unitHtml = units.map(u => {
            const comp = (getVal(u, 'composition') || "").split('|').map(item => {
                const pts = item.split(':');
                return `<div class="comp-row"><span>${pts[0]}</span><span>${pts[1]||''}</span></div>`;
            }).join('');
            return `
                <div class="unit-card" style="border-left-color:${getVal(u, 'hexcolor')||'#00d2ff'}">
                    <div style="font-weight:bold; display:flex; justify-content:space-between;">
                        <span>${getVal(u, 'name').toUpperCase()}</span>
                        <span style="font-size:0.7em; color:var(--tactical-blue)">${getVal(u, 'type').toUpperCase()}</span>
                    </div>
                    <div style="font-size:0.8em; margin: 5px 0;">STRENGTH: ${getVal(u, 'strength')}</div>
                    <div style="border-top:1px solid rgba(255,255,255,0.1); padding-top:5px;">${comp}</div>
                </div>`;
        }).join('');

        document.getElementById('sidebar-content').innerHTML = `
            <div class="sidebar-header">
                <h2 style="color:${color}">${getVal(p, 'name').toUpperCase()}</h2>
                <div style="font-size:0.8em; opacity:0.6;">${getVal(p, 'type').toUpperCase()} SECTOR</div>
            </div>
            ${isContested ? '<div class="contested-banner">⚠ CONTESTED ZONE - PRIORITY ALPHA ⚠</div>' : ''}
            <div style="margin-bottom:20px;">
                <div class="stat-row"><span>OWNER:</span><b>${getVal(p, 'owner').toUpperCase()}</b></div>
                <div class="stat-row"><span>RESOURCES:</span><b style="color:var(--resource-gold)">${getVal(p, 'resources')}</b></div>
                <div class="stat-row"><span>MANPOWER:</span><b style="color:var(--manpower-green)">${getVal(p, 'manpower')}</b></div>
            </div>
            <div style="font-size:0.7em; color:var(--tactical-blue); margin-bottom:10px; border-bottom:1px solid var(--tactical-blue)">TACTICAL ASSET LIST</div>
            ${unitHtml || '<p style="opacity:0.5; font-style:italic;">No orbital signatures detected.</p>'}
        `;
    }

    init();
</script>
</body>
</html>
